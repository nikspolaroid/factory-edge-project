services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: factory-mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped

  edge-gateway:
    build: ./edge-gateway
    container_name: factory-edge-gateway
    depends_on:
      - mosquitto
    environment:
      - OPCUA_URL=opc.tcp://host.docker.internal:4840/freeopcua/server/
      - MODBUS_HOST=host.docker.internal
      - MODBUS_PORT=5020
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    restart: unless-stopped
